<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free Fire Tournament</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: url("bg.jpg") no-repeat center center/cover;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
}

.container {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
}

.form-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    color: white;
    box-shadow: 0 0 25px red;
}

.form-box h1 {
    color: #ff3c3c;
}

form input, 
form textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

form textarea {
    height: 80px;
    resize: none;
}

form button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, red, orange);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.info-box {
    background: rgba(255,255,255,0.9);
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
}

.info-box h2 {
    color: red;
}

#thankyou {
    display: none;
    color: #00ff88;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="form-box">
<h1>FREE TOURNAMENTS !!</h1>

<form action="https://formsubmit.co/nikhileshgurjar11@gmail.com"
      method="POST"
      target="hidden_iframe"
      onsubmit="submitted()">

<input type="text" name="Player Name" placeholder="Name" required>
<input type="text" name="Player UID" placeholder="UID" required>
<input type="text" name="Instagram ID" placeholder="Instagram" required>
<input type="text" name="Player Level" placeholder="Level" required>

<label>Can you win ??</label>
<textarea name="Winning Confidence" placeholder="Comment"></textarea>

<input type="hidden" name="_subject" value="🔥 New Free Fire Tournament Entry!">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<button type="submit">SUBMIT</button>

</form>

<div id="thankyou">
✅ Thank You! Your entry has been submitted 🔥
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<div class="info-box">
<h2>Jaruri baatein dhyan rakhe !</h2>
<ul>
<li>Only booyah price is 30rs. no extra reward</li>
<li>Room id and password announce on @nikhilesh_gurjar</li>
<li>Time - 7pm, 6 Mar, 2026</li>
</ul>
</div>

</div>

<script>
function submitted() {
    setTimeout(function(){
        document.getElementById("thankyou").style.display = "block";
        document.querySelector("form").reset();
    }, 500);
}
</script>

</body>
</html>
